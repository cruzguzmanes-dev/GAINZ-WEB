<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Auth — Inicia sesión con tu app</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --border: rgba(255,255,255,0.07);
      --text: #e8e8f0;
      --muted: #6b6b80;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(108,99,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108,99,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      box-shadow:
        0 0 0 1px rgba(108,99,255,0.1),
        0 32px 64px rgba(0,0,0,0.4);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
    }

    /* ── QR container ── */
    .qr-wrap {
      position: relative;
      width: 220px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-frame {
      position: absolute;
      inset: -10px;
      border-radius: 20px;
      border: 1.5px solid transparent;
      background: linear-gradient(var(--surface), var(--surface)) padding-box,
                  linear-gradient(135deg, var(--accent), var(--accent2), var(--accent)) border-box;
      animation: rotateBorder 4s linear infinite;
    }

    @keyframes rotateBorder {
      from { filter: hue-rotate(0deg); }
      to   { filter: hue-rotate(360deg); }
    }

    #qr-inner {
      width: 200px;
      height: 200px;
      background: white;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    #qr-inner canvas, #qr-inner img {
      border-radius: 8px;
    }

    /* Scanned overlay */
    .qr-scanned-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10,10,15,0.92);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .qr-scanned-overlay.show { opacity: 1; }

    .qr-scanned-overlay .check {
      width: 48px;
      height: 48px;
      background: var(--green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .qr-scanned-overlay .scan-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--green);
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .status-dot.pending  { background: var(--yellow); animation: pulse 1.5s ease-in-out infinite; }
    .status-dot.scanned  { background: var(--accent2); }
    .status-dot.authed   { background: var(--green); }
    .status-dot.expired  { background: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Steps ── */
    .steps {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      opacity: 0.4;
      transition: opacity 0.3s;
    }

    .step.active { opacity: 1; }

    .step-num {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      flex-shrink: 0;
      font-family: 'DM Mono', monospace;
      transition: all 0.3s;
    }

    .step.active .step-num {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border-color: transparent;
    }

    .step-text {
      font-size: 13.5px;
      line-height: 1.5;
    }

    .step-text strong { color: var(--text); font-weight: 500; }
    .step-text span   { color: var(--muted); }

    /* ── Timer ── */
    .timer {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .timer.warning { color: var(--yellow); }
    .timer.expired { color: var(--red); }

    /* ── Success screen ── */
    #success-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .success-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--green), #059669);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: 0 0 40px rgba(52,211,153,0.3);
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }

    .user-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      color: white;
      margin-bottom: 4px;
    }

    .user-name {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .user-email {
      font-size: 13px;
      color: var(--muted);
    }

    .session-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      word-break: break-all;
      text-align: center;
      max-width: 100%;
    }

    .btn-refresh {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-refresh:hover {
      border-color: var(--accent);
      color: var(--accent2);
    }

    /* ── Error state ── */
    .error-msg {
      display: none;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--red);
      text-align: center;
      width: 100%;
    }

    /* Loading skeleton */
    .qr-skeleton {
      width: 180px;
      height: 180px;
      border-radius: 8px;
      background: linear-gradient(90deg, var(--surface2) 25%, var(--surface) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      from { background-position: 200% 0; }
      to   { background-position: -200% 0; }
    }
  </style>
</head>
<body>

<div class="card" id="main-card">
  <div class="logo">
    <div class="logo-icon">⬡</div>
    <span class="logo-text">QR Auth</span>
  </div>

  <div class="divider"></div>

  <!-- QR State -->
  <div id="qr-state" style="display:flex; flex-direction:column; align-items:center; gap:24px; width:100%;">
    <div class="qr-wrap">
      <div class="qr-frame"></div>
      <div id="qr-inner"><div class="qr-skeleton"></div></div>
      <div class="qr-scanned-overlay" id="scanned-overlay">
        <div class="check">✓</div>
        <div class="scan-label">¡Escaneado!</div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-dot pending" id="status-dot"></div>
      <span id="status-text">Esperando escaneo...</span>
    </div>

    <div class="steps">
      <div class="step active" id="step-1">
        <div class="step-num">1</div>
        <div class="step-text">
          <strong>Abre tu app</strong><br/>
          <span>Ve a Ajustes → Vincular dispositivo</span>
        </div>
      </div>
      <div class="step" id="step-2">
        <div class="step-num">2</div>
        <div class="step-text">
          <strong>Escanea el código QR</strong><br/>
          <span>Apunta la cámara al QR de esta pantalla</span>
        </div>
      </div>
      <div class="step" id="step-3">
        <div class="step-num">3</div>
        <div class="step-text">
          <strong>Confirma en tu teléfono</strong><br/>
          <span>Toca "Confirmar" en la notificación</span>
        </div>
      </div>
    </div>

    <div class="timer" id="timer">Expira en 02:00</div>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <!-- Success State -->
  <div id="success-screen">
    <div class="success-icon">✓</div>
    <div>
      <div class="user-avatar" id="user-avatar">--</div>
    </div>
    <div>
      <div class="user-name" id="user-name">—</div>
      <div class="user-email" id="user-email">—</div>
    </div>
    <div style="font-size:13px; color:var(--muted);">Sesión iniciada correctamente</div>
    <div class="session-badge" id="session-badge">—</div>
    <button class="btn-refresh" onclick="location.reload()">Generar nuevo QR</button>
  </div>
</div>

<script>
  // ─── Config ───────────────────────────────────────────────────────────────
  // Change this to your deployed backend URL
  const BACKEND_URL = window.BACKEND_URL || "http://localhost:3001";

  // ─── State ────────────────────────────────────────────────────────────────
  let currentToken = null;
  let sseSource = null;
  let timerInterval = null;
  let expiresAt = null;

  // ─── DOM refs ─────────────────────────────────────────────────────────────
  const qrInner      = document.getElementById("qr-inner");
  const statusDot    = document.getElementById("status-dot");
  const statusText   = document.getElementById("status-text");
  const timerEl      = document.getElementById("timer");
  const scannedOverl = document.getElementById("scanned-overlay");
  const errorMsg     = document.getElementById("error-msg");
  const step1 = document.getElementById("step-1");
  const step2 = document.getElementById("step-2");
  const step3 = document.getElementById("step-3");

  // ─── Init ─────────────────────────────────────────────────────────────────
  async function init() {
    try {
      const res  = await fetch(`${BACKEND_URL}/auth/qr/generate`);
      const data = await res.json();
      currentToken = data.token;
      expiresAt    = Date.now() + data.expiresIn * 1000;

      renderQR(data.deepLink);
      startTimer();
      listenSSE(data.token);
    } catch (e) {
      showError("No se pudo conectar al servidor. ¿Está corriendo el backend?");
    }
  }

  function renderQR(content) {
    qrInner.innerHTML = "";
    new QRCode(qrInner, {
      text: content,
      width: 180,
      height: 180,
      colorDark: "#0a0a0f",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M,
    });
  }

  function listenSSE(token) {
    sseSource = new EventSource(`${BACKEND_URL}/auth/qr/status/${token}`);

    sseSource.addEventListener("scanned", (e) => {
      const d = JSON.parse(e.data);
      onScanned(d);
    });

    sseSource.addEventListener("authenticated", (e) => {
      const d = JSON.parse(e.data);
      onAuthenticated(d);
    });

    sseSource.addEventListener("expired", () => {
      onExpired();
    });

    sseSource.onerror = () => {
      // SSE closed by server after auth — ignore if already authed
    };
  }

  function startTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      const remaining = Math.max(0, expiresAt - Date.now());
      const mins = String(Math.floor(remaining / 60000)).padStart(2, "0");
      const secs = String(Math.floor((remaining % 60000) / 1000)).padStart(2, "0");
      timerEl.textContent = `Expira en ${mins}:${secs}`;
      timerEl.className = remaining < 30000 ? "timer warning" : "timer";
      if (remaining === 0) {
        clearInterval(timerInterval);
        onExpired();
      }
    }, 1000);
  }

  // ─── State transitions ────────────────────────────────────────────────────
  function onScanned(data) {
    // Update UI to "scanned" state
    statusDot.className = "status-dot scanned";
    statusText.textContent = `📱 Escaneado por ${data.userName || "el dispositivo"}...`;
    scannedOverl.classList.add("show");
    step1.classList.remove("active");
    step2.classList.add("active");
    step3.classList.add("active");
    clearInterval(timerInterval);
    timerEl.textContent = "Confirmando...";
    timerEl.className = "timer";
  }

  function onAuthenticated(data) {
    clearInterval(timerInterval);
    if (sseSource) sseSource.close();

    // Show success screen
    document.getElementById("qr-state").style.display = "none";
    const successScreen = document.getElementById("success-screen");
    successScreen.style.display = "flex";
    document.getElementById("user-avatar").textContent = data.user.avatar;
    document.getElementById("user-name").textContent   = data.user.name;
    document.getElementById("user-email").textContent  = data.user.email;
    document.getElementById("session-badge").textContent = `Session: ${data.webSession}`;

    // Save session (MVP: sessionStorage)
    sessionStorage.setItem("webSession", data.webSession);
    sessionStorage.setItem("user", JSON.stringify(data.user));
  }

  function onExpired() {
    clearInterval(timerInterval);
    if (sseSource) sseSource.close();
    statusDot.className = "status-dot expired";
    statusText.textContent = "QR expirado";
    timerEl.textContent = "Expirado";
    timerEl.className = "timer expired";
    showError("El código QR expiró. Recarga la página para generar uno nuevo.");
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = "block";
  }

  // ─── Start ────────────────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
